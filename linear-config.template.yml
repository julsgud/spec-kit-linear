# Linear integration configuration for spec-kit
# Copy to .specify/extensions/linear/linear-config.yml and customize

# MCP server name — varies by setup
# Common values: "claude_ai_Linear", "linear"
mcp_server: "claude_ai_Linear"

# Linear team name (must match exactly)
team: ""

# Optional: Linear project name for grouping issues
project: ""

defaults:
  # Labels to apply to child issues created by /tasks
  labels: []

  # Priority for child issues (0=None, 1=Urgent, 2=High, 3=Normal, 4=Low)
  priority: 3

  # Initial status for child issues created by /tasks
  status: "Backlog"

  # Copy parent issue's labels to child issues
  inherit_labels: true

# Autonomous resolution settings
# When enabled, commands dispatch sub-agents to research findings before posting artifacts
resolution:
  enabled: true                    # toggle resolution on/off
  strategies: [codebase, linear, web]  # research order: codebase exploration, related Linear issues, web search
  max_agents: 10                   # cap sub-agents per command
  auto_resolve_threshold: "high"   # "high" = only RESOLVED; "medium" = RESOLVED + SUGGESTION

# Pipeline orchestration settings
# Controls behavior of /speckit.linear.pipeline
pipeline:
  steps: [specify, clarify, analyze, plan, checklist]
  chain_breaks:
    new_dependencies: true         # pause when new dependencies are discovered
    scope_expansion: true          # pause when scope grows beyond original issue
    high_risk_threshold: 3         # pause when risk items exceed this count
  post_summary: true               # post pipeline summary comment when complete
  skip_completed: true             # skip steps that already have artifacts
